---
stages:
- test
- secret-detection
- validate
- deploy

variables:
  SECRET_DETECTION_ENABLED: 'true'

include:
- template: Security/Secret-Detection.gitlab-ci.yml

secret_detection:
  stage: secret-detection

.base_databricks:
  image: "macos:latest"   # placeholder, GitLab Runner on your macOS VM will execute it
  before_script:
    - /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || echo "Homebrew already installed"
    - eval "$(/opt/homebrew/bin/brew shellenv)" || eval "$(/usr/local/bin/brew shellenv)"
    - brew install python jq unzip curl || echo "Dependencies already installed"
    - brew install databricks-cli
    - databricks --version

databricks_bundle_validate:
  extends: .base_databricks
  stage: validate
  script:
    - databricks bundle validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always

databricks_bundle_deploy:
  extends: .base_databricks
  stage: deploy
  script:
    - databricks bundle deploy
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
    - when: never
