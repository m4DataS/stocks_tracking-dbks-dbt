---
stages:
- test
- secret-detection
- validate
- deploy

variables:
  SECRET_DETECTION_ENABLED: 'true'

include:
- template: Security/Secret-Detection.gitlab-ci.yml

secret_detection:
  stage: secret-detection

.base_databricks:
  image: python:3.10
  before_script:
    - apt-get update && apt-get install -y curl jq unzip
    - curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/setup.sh | sh
    - databricks --version

databricks_bundle_validate:
  extends: .base_databricks
  stage: validate
  script:
    - databricks bundle validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always

databricks_bundle_deploy:
  extends: .base_databricks
  stage: deploy
  script:
    - databricks bundle deploy
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
    - when: never
