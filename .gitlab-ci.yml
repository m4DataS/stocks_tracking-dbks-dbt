---
stages:
- test
- secret-detection
- validate
- deploy

variables:
  SECRET_DETECTION_ENABLED: 'true'

include:
- template: Security/Secret-Detection.gitlab-ci.yml

secret_detection:
  stage: secret-detection

.base_databricks:
  image: python:3.10-slim
  before_script:
    # Install Linux dependencies required by Homebrew
    - apt-get update && apt-get install -y build-essential curl file git
    # Install Homebrew (Linuxbrew)
    - /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
    # Add Homebrew to PATH
    - echo 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"' >> ~/.bashrc
    - eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
    # Install databricks-cli via brew
    - brew tap databricks/tap
    - brew install databricks
    - |
      # Optional: add databricks completions (bash)
      if [ -f "$(brew --prefix)/etc/bash_completion.d/databricks" ]; then
          echo "source $(brew --prefix)/etc/bash_completion.d/databricks" >> ~/.bashrc
          source $(brew --prefix)/etc/bash_completion.d/databricks
      fi
    # Verify installation
    - databricks --version

databricks_bundle_validate:
  extends: .base_databricks
  stage: validate
  script:
    - databricks bundle validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always

databricks_bundle_deploy:
  extends: .base_databricks
  stage: deploy
  script:
    - databricks bundle deploy
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
    - when: never
