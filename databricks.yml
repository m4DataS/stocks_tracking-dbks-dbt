---
bundle:
  name: finance_tracking
 
include:
  - resources/*.yml
 
sync:
  paths:
    - ingestion/requirements.txt
    - ingestion/ingest_yahoof.py

# artifacts:
#   default:
#     type: whl
#     path: .
#     build: python -m build --wheel --outdir dist

# experimental:
#   scripts:
#     predeploy: "databricks fs cp dist/${var.wheel_name} dbfs:/Volumes/dev_data_cloud_cicd/demo_da_cicd/demo_da_cicd_volume_DAB/ --overwrite --profile dev"

variables:
  tickers:
    default: "all"
  start_date:
    default: "{{job.start_time.iso_date_minus_1d}}"
  end_date:
    default: "{{job.start_time.iso_date}}"
  output_path:
    default: "/Volumes/workspace/finance_news/stock-tracking/yahoo/stock_prices/"
  max_workers:
    default: "10"
  chunk_size:
    default: "5"


targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: ${workspace.current_user.userName}
        level: CAN_MANAGE
