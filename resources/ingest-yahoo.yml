resources:
  jobs:
    finan_tracking_ingestion:
      name: finan_tracking_ingestion
      tasks:
        - task_key: ingestion_yahoof
          spark_python_task:
            python_file: ../ingestion/ingest_yahoof.py
            parameters:
              - --tickers
              - ${var.tickers}
              - --start
              - ${var.start_date}
              - --end
              - ${var.end_date}
              - --output
              - ${var.output_path}
              - --max_workers
              - ${var.max_workers}
              - --chunk_size
              - ${var.chunk_size}
          environment_key: ingestion_yahoof_environment
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "4"
        - environment_key: ingestion_yahoof_environment
          spec:
            dependencies:
              - -r
                ../ingestion/setup/requirements.txt
            environment_version: "4"
      performance_target: PERFORMANCE_OPTIMIZED